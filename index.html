<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Haul Ke-28</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><meta property="og:image" content="https://barokgagah09-byte.github.io/pesaen-kaos/foto-hitam.webp" />
<meta property="og:title" content="Haul Ke-28 - Pesaen Kaos" />
<meta property="og:description" content="Mantep nih ji, kaos hitam L lengan panjang" />
<meta property="og:url" content="https://barokgagah09-byte.github.io/pesaen-kaos/" />
<meta property="og:type" content="website" />
<body class="bg-black text-white">
<div class="max-w-2xl mx-auto p-4">
<div class="rounded-2xl border-2 border-yellow-600 p-6 bg-zinc-900">
<h1 class="text-3xl font-bold">T-SHIRT <span class="text-yellow-500">HAUL 28</span></h1>
<img id="mainImg" src="foto-hitam.webp" class="w-full h-[500px] object-cover rounded-xl mt-6 border-2 border-yellow-600">

<p class="text-xs text-yellow-500 font-bold mt-6">1. WARNA</p>
<div class="grid grid-cols-2 gap-3 mt-2">
<button id="b-hitam" onclick="setWarna('HITAM')" class="p-3 rounded-xl font-bold border-2 border-yellow-500 bg-yellow-500/20">HITAM</button>
<button id="b-putih" onclick="setWarna('PUTIH')" class="p-3 rounded-xl font-bold border border-white/30">PUTIH</button>
</div>

<p class="text-xs text-yellow-500 font-bold mt-5">2. MODEL</p>
<div class="grid gap-3 mt-2">
<button id="b-pendek" onclick="setModel('PENDEK')" class="p-3 rounded-xl border border-white/30 flex justify-between"><span>PENDEK</span><b id="harga-pendek">Rp 115k</b></button>
<button id="b-panjang" onclick="setModel('PANJANG')" class="p-3 rounded-xl border-2 border-yellow-500 bg-yellow-500/20 flex justify-between"><span>PANJANG</span><b id="harga-panjang">Rp 125k</b></button>
</div>

<p class="text-xs text-yellow-500 font-bold mt-5">3. UKURAN (2XL +5rb)</p>
<div class="grid grid-cols-5 gap-2 mt-2">
<button id="u-S" onclick="setUk('S')" class="p-2 rounded border">S</button>
<button id="u-M" onclick="setUk('M')" class="p-2 rounded border">M</button>
<button id="u-L" onclick="setUk('L')" class="p-2 rounded border-2 border-yellow-500 bg-yellow-500/20">L</button>
<button id="u-XL" onclick="setUk('XL')" class="p-2 rounded border">XL</button>
<button id="u-2XL" onclick="setUk('2XL')" class="p-2 rounded border">2XL</button>
</div>

<input id="nama" placeholder="Nama Pemesan" class="w-full mt-5 p-3 rounded-xl bg-white/10 border">
<div class="mt-3 text-center bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-xl">
<p id="total" class="text-xl font-bold text-yellow-500">Rp 125.000</p>
<p id="keterangan" class="text-[10px] text-gray-400">Lengan Panjang L - Normal</p>
</div>
<button onclick="orderWA()" class="w-full mt-3 bg-green-500 text-black font-extrabold p-4 rounded-xl">ORDER WHATSAPP</button>
</div>
</div>

<script>
let warna='HITAM', model='PANJANG', ukuran='L';
function hitung(){
let base = model=='PANJANG'?125000:115000;
if(ukuran=='2XL') base+=5000;
document.getElementById('total').innerText = 'Rp ' + base.toLocaleString('id-ID');
document.getElementById('keterangan').innerText = `Lengan ${model} ${ukuran}` + (ukuran=='2XL'?' - Tambah 5rb':' - Normal');
return base;
}
function setWarna(w){
warna=w;
document.getElementById('mainImg').src = w=='PUTIH'? 'foto-putih.webp' : 'foto-hitam.webp';
document.getElementById('b-hitam').className = w=='HITAM'? 'p-3 rounded-xl font-bold border-2 border-yellow-500 bg-yellow-500/20' : 'p-3 rounded-xl font-bold border border-white/30';
document.getElementById('b-putih').className = w=='PUTIH'? 'p-3 rounded-xl font-bold border-2 border-yellow-500 bg-yellow-500/20' : 'p-3 rounded-xl font-bold border border-white/30';
}
function setModel(m){
model=m;
document.getElementById('b-pendek').className = m=='PENDEK'? 'p-3 rounded-xl border-2 border-yellow-500 bg-yellow-500/20 flex justify-between' : 'p-3 rounded-xl border border-white/30 flex justify-between';
document.getElementById('b-panjang').className = m=='PANJANG'? 'p-3 rounded-xl border-2 border-yellow-500 bg-yellow-500/20 flex justify-between' : 'p-3 rounded-xl border border-white/30 flex justify-between';
hitung();
}
function setUk(u){
ukuran=u;
['S','M','L','XL','2XL'].forEach(k=>{
document.getElementById('u-'+k).className = k==u? 'p-2 rounded border-2 border-yellow-500 bg-yellow-500/20 font-bold' : 'p-2 rounded border';
});
hitung();
}
function orderWA(){
let total=hitung();
let nama=document.getElementById('nama').value||'Hamba Allah';
let txt=`Halo H.Barok, pesan Haul 28:%0ANama: ${nama}%0AWarna: ${warna}%0AModel: ${model}%0AUkuran: ${ukuran} ${ukuran=='2XL'?'(+5rb)':''}%0ATotal: Rp ${total.toLocaleString('id-ID')}%0AFormat: ${nama}-${ukuran}-${model}-${warna}`;
window.open('https://wa.me/6287736330469?text='+txt,'_blank');
}
hitung();
</script>
</body>
</html>
