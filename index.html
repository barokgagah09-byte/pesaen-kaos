<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Haul Ke-28</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- INI YANG BIKIN ADA GAMBAR DI WA -->
<meta property="og:image" content="https://barokgagah09-byte.github.io/pesaen-kaos/foto-hitam.webp" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:title" content="Haul Ke-28 - Pesaen Kaos" />
<meta property="og:description" content="Mantep nih ji, kaos hitam L lengan panjang - Order disini" />
<meta property="og:url" content="https://barokgagah09-byte.github.io/pesaen-kaos/" />
<meta property="og:type" content="website" />

</head>
<body class="bg-black text-white">
<div class="max-w-2xl mx-auto p-4">
<div class="rounded-2xl border-2 border-yellow-600 p-6 bg-zinc-900">
<h1 class="text-3xl font-bold">T-SHIRT <span class="text-yellow-500">HAUL 28</span></h1>
<img id="mainImg" src="foto-hitam.webp" class="w-full h-[500px] object-cover rounded-xl mt-4">

<p class="text-xs text-yellow-500 font-bold mt-6">1. WARNA</p>
<div class="grid grid-cols-2 gap-3 mt-2">
<button id="b-hitam" onclick="setWarna('HITAM')" class="p-3 rounded-xl font-bold bg-yellow-500 text-black">HITAM</button>
<button id="b-putih" onclick="setWarna('PUTIH')" class="p-3 rounded-xl font-bold border">PUTIH</button>
</div>

<p class="text-xs text-yellow-500 font-bold mt-5">2. MODEL</p>
<div class="grid gap-3 mt-2">
<button id="b-pendek" onclick="setModel('PENDEK')" class="p-3 rounded-xl border">PENDEK</button>
<button id="b-panjang" onclick="setModel('PANJANG')" class="p-3 rounded-xl border-2 border-yellow-500 bg-yellow-500/20">PANJANG</button>
</div>

<p class="text-xs text-yellow-500 font-bold mt-5">3. UKURAN (2XL +5rb)</p>
<div class="grid grid-cols-5 gap-2 mt-2">
<button id="u-S" onclick="setUk('S')" class="p-2 rounded border">S</button>
<button id="u-M" onclick="setUk('M')" class="p-2 rounded border">M</button>
<button id="u-L" onclick="setUk('L')" class="p-2 rounded border-2 border-yellow-500 bg-yellow-500/20">L</button>
<button id="u-XL" onclick="setUk('XL')" class="p-2 rounded border">XL</button>
<button id="u-2XL" onclick="setUk('2XL')" class="p-2 rounded border">2XL</button>
</div>

<input id="nama" placeholder="Nama Pemesan" class="w-full mt-5 p-3 rounded-xl bg-black border text-white">
<div class="mt-3 text-center bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-xl">
<p id="total" class="text-xl font-bold text-yellow-500">Rp 125.000</p>
<p id="keterangan" class="text-[10px] text-gray-400">Lengan Panjang L - Normal</p>
</div>
<button onclick="orderWA()" class="w-full mt-3 bg-green-500 text-black font-extrabold p-4 rounded-xl">PESAN VIA WHATSAPP</button>
</div>
</div>

<script>
let warna='HITAM', model='PANJANG', ukuran='L';
function setWarna(w){
  warna=w;
  document.getElementById('mainImg').src = w==='HITAM'? 'foto-hitam.webp' : 'foto-putih.webp';
  document.getElementById('b-hitam').className = w==='HITAM'? 'p-3 rounded-xl font-bold bg-yellow-500 text-black' : 'p-3 rounded-xl font-bold border';
  document.getElementById('b-putih').className = w==='PUTIH'? 'p-3 rounded-xl font-bold bg-yellow-500 text-black' : 'p-3 rounded-xl font-bold border';
  update();
}
function setModel(m){
  model=m;
  document.getElementById('b-pendek').className = m==='PENDEK'? 'p-3 rounded-xl border-2 border-yellow-500 bg-yellow-500/20' : 'p-3 rounded-xl border';
  document.getElementById('b-panjang').className = m==='PANJANG'? 'p-3 rounded-xl border-2 border-yellow-500 bg-yellow-500/20' : 'p-3 rounded-xl border';
  update();
}
function setUk(u){
  ukuran=u;
  ['S','M','L','XL','2XL'].forEach(x=>{document.getElementById('u-'+x).className='p-2 rounded border'});
  document.getElementById('u-'+u).className='p-2 rounded border-2 border-yellow-500 bg-yellow-500/20';
  update();
}
function update(){
  let harga = ukuran==='2XL'? 130000 : 125000;
  document.getElementById('total').innerText = 'Rp ' + harga.toLocaleString('id-ID');
  document.getElementById('keterangan').innerText = `${model} ${ukuran} - ${warna} ${ukuran==='2XL'? '+5rb' : 'Normal'}`;
}
function orderWA(){
  let nama = document.getElementById('nama').value || 'Tanpa Nama';
  let teks = `Mantep nih ji, gw pesen kaos:%0A%0A- Nama: ${nama}%0A- Warna: ${warna}%0A- Model: ${model}%0A- Ukuran: ${ukuran}%0A- Total: ${document.getElementById('total').innerText}%0A%0ALink: https://barokgagah09-byte.github.io/pesaen-kaos/`;
  window.open(`https://wa.me/?text=${teks}`, '_blank');
}
update();
</script>
</body>
</html>
